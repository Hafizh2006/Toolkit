<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Toolkit</title>
<link rel="stylesheet" href="style.css">
<style>
  :root { --accent: var(--orange); }

  .tool-head {
    padding: 40px 0 28px;
    border-bottom: 1px solid var(--line);
  }
  .tool-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
  }
  .tool-tag::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 2px;
  }
  .tool-head h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .tool-head p {
    color: var(--ink-soft);
    margin: 0;
    max-width: 50ch;
  }

  .tool-body { padding: 40px 0 60px; }

  .category-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .category-tabs button {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 9px 18px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.15s;
  }
  .category-tabs button.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .converter-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 32px;
  }

  .convert-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 20px;
    align-items: center;
  }
  @media (max-width: 600px) {
    .convert-row { grid-template-columns: 1fr; }
    .swap-btn { justify-self: center; transform: rotate(90deg); }
  }

  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.74rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .field input[type="number"] {
    width: 100%;
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 600;
    border: none;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--ink);
  }
  .field select {
    width: 100%;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 0.88rem;
    padding: 9px 10px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
  }
  .swap-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper);
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, transform 0.2s;
  }
  .swap-btn:hover { border-color: var(--ink); }

  .result-note {
    margin-top: 22px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="index.html" class="brand"><span class="brand-mark"></span>Toolkit</a>
    <a href="index.html" class="nav-back">&larr; Semua panel</a>
  </div>
</nav>

<div class="shell">

  <header class="tool-head">
    <span class="tool-tag">Panel 01 — Konversi</span>
    <h1>Unit Converter</h1>
    <p>Konversi langsung saat kamu mengetik. Pilih kategori, tentukan satuan, dan hasilnya muncul tanpa perlu tekan tombol.</p>
  </header>

  <section class="tool-body">

    <div class="category-tabs">
      <button class="active" data-cat="length">Panjang</button>
      <button data-cat="weight">Berat</button>
      <button data-cat="temp">Suhu</button>
    </div>

    <div class="converter-card">
      <div class="convert-row">
        <div class="field">
          <label for="fromVal">Dari</label>
          <input type="number" id="fromVal" value="1" inputmode="decimal">
          <select id="fromUnit"></select>
        </div>

        <button class="swap-btn" id="swapBtn" aria-label="Tukar satuan">&#8646;</button>

        <div class="field">
          <label for="toVal">Hasil</label>
          <input type="number" id="toVal" readonly>
          <select id="toUnit"></select>
        </div>
      </div>
      <div class="result-note" id="resultNote"></div>
    </div>

  </section>
</div>

<footer class="site-footer">
  <div class="shell">
    <span>Panel 01 / 04</span>
    <a href="index.html" style="text-decoration:none; color:inherit;">Kembali ke Toolkit</a>
  </div>
</footer>

<script>
const UNITS = {
  length: {
    label: 'Panjang',
    base: 'm',
    units: {
      m:  { name: 'Meter (m)',       toBase: v => v,        fromBase: v => v },
      km: { name: 'Kilometer (km)',  toBase: v => v * 1000,  fromBase: v => v / 1000 },
      cm: { name: 'Sentimeter (cm)', toBase: v => v / 100,   fromBase: v => v * 100 },
      mi: { name: 'Mil (mi)',        toBase: v => v * 1609.34, fromBase: v => v / 1609.34 },
      ft: { name: 'Kaki (ft)',       toBase: v => v * 0.3048, fromBase: v => v / 0.3048 },
      in: { name: 'Inci (in)',       toBase: v => v * 0.0254, fromBase: v => v / 0.0254 },
    }
  },
  weight: {
    label: 'Berat',
    base: 'kg',
    units: {
      kg: { name: 'Kilogram (kg)', toBase: v => v,        fromBase: v => v },
      g:  { name: 'Gram (g)',      toBase: v => v / 1000,  fromBase: v => v * 1000 },
      lb: { name: 'Pon (lb)',      toBase: v => v * 0.453592, fromBase: v => v / 0.453592 },
      oz: { name: 'Ons (oz)',      toBase: v => v * 0.0283495, fromBase: v => v / 0.0283495 },
    }
  },
  temp: {
    label: 'Suhu',
    base: 'c',
    units: {
      c: { name: 'Celsius (°C)',    toBase: v => v,            fromBase: v => v },
      f: { name: 'Fahrenheit (°F)', toBase: v => (v - 32) * 5/9, fromBase: v => v * 9/5 + 32 },
      k: { name: 'Kelvin (K)',      toBase: v => v - 273.15,   fromBase: v => v + 273.15 },
    }
  }
};

let currentCat = 'length';

const fromValEl = document.getElementById('fromVal');
const toValEl = document.getElementById('toVal');
const fromUnitEl = document.getElementById('fromUnit');
const toUnitEl = document.getElementById('toUnit');
const resultNote = document.getElementById('resultNote');

function populateUnits(cat, defaultFromIdx, defaultToIdx) {
  const entries = Object.entries(UNITS[cat].units);
  fromUnitEl.innerHTML = entries.map(([k, u]) => `<option value="${k}">${u.name}</option>`).join('');
  toUnitEl.innerHTML = entries.map(([k, u]) => `<option value="${k}">${u.name}</option>`).join('');
  fromUnitEl.selectedIndex = defaultFromIdx || 0;
  toUnitEl.selectedIndex = defaultToIdx !== undefined ? defaultToIdx : (entries.length > 1 ? 1 : 0);
}

function convert() {
  const cat = UNITS[currentCat];
  const fromKey = fromUnitEl.value;
  const toKey = toUnitEl.value;
  const input = parseFloat(fromValEl.value);

  if (isNaN(input)) {
    toValEl.value = '';
    resultNote.textContent = 'Masukkan angka yang valid.';
    return;
  }

  const baseVal = cat.units[fromKey].toBase(input);
  const result = cat.units[toKey].fromBase(baseVal);
  const rounded = Math.round(result * 100000) / 100000;
  toValEl.value = rounded;
  resultNote.textContent = `${input} ${cat.units[fromKey].name} = ${rounded} ${cat.units[toKey].name}`;
}

document.querySelectorAll('.category-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.category-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    populateUnits(currentCat);
    fromValEl.value = 1;
    convert();
  });
});

document.getElementById('swapBtn').addEventListener('click', () => {
  const fIdx = fromUnitEl.selectedIndex;
  const tIdx = toUnitEl.selectedIndex;
  fromUnitEl.selectedIndex = tIdx;
  toUnitEl.selectedIndex = fIdx;
  convert();
});

fromValEl.addEventListener('input', convert);
fromUnitEl.addEventListener('change', convert);
toUnitEl.addEventListener('change', convert);

populateUnits(currentCat);
convert();
</script>

</body>
</html>
