<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Toolkit</title>
<link rel="stylesheet" href="style.css">
<style>
  :root { --accent: var(--blue); }

  .tool-head { padding: 40px 0 28px; border-bottom: 1px solid var(--line); }
  .tool-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 0.78rem; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px;
  }
  .tool-tag::before { content:''; width: 8px; height: 8px; background: var(--accent); border-radius: 2px; }
  .tool-head h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.4rem); margin: 0 0 8px; letter-spacing: -0.01em; }
  .tool-head p { color: var(--ink-soft); margin: 0; max-width: 50ch; }

  .tool-body { padding: 40px 0 60px; }

  .pw-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px;
  }

  .pw-display {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 8px;
    padding: 22px 22px;
    margin-bottom: 26px;
  }
  .pw-display span#pwOutput {
    font-family: var(--font-mono);
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    letter-spacing: 0.02em;
    word-break: break-all;
  }
  .copy-btn {
    flex-shrink: 0;
    background: var(--accent);
    color: var(--paper);
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .copy-btn:hover { opacity: 0.88; }

  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .control-row label {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--ink);
  }
  .control-row .val {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--accent);
  }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    margin: 4px 0 22px;
  }

  .checks {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 26px;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
  }
  .check-item input { accent-color: var(--accent); width: 16px; height: 16px; }

  .gen-btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .gen-btn:hover { background: #36352f; }

  .strength {
    margin-top: 16px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="index.html" class="brand"><span class="brand-mark"></span>Toolkit</a>
    <a href="index.html" class="nav-back">&larr; Semua panel</a>
  </div>
</nav>

<div class="shell">

  <header class="tool-head">
    <span class="tool-tag">Panel 02 — Keamanan</span>
    <h1>Password Generator</h1>
    <p>Atur panjang dan jenis karakter, lalu buat kata sandi acak yang sulit ditebak. Semua diproses di perangkatmu sendiri, tidak dikirim ke mana pun.</p>
  </header>

  <section class="tool-body">
    <div class="pw-card">

      <div class="pw-display">
        <span id="pwOutput">Tr7$kLmZ9!Qw</span>
        <button class="copy-btn" id="copyBtn">Salin</button>
      </div>

      <div class="control-row">
        <label for="lengthRange">Panjang kata sandi</label>
        <span class="val" id="lengthVal">12</span>
      </div>
      <input type="range" id="lengthRange" min="6" max="32" value="12">

      <div class="checks">
        <label class="check-item"><input type="checkbox" id="optUpper" checked> Huruf besar (A-Z)</label>
        <label class="check-item"><input type="checkbox" id="optLower" checked> Huruf kecil (a-z)</label>
        <label class="check-item"><input type="checkbox" id="optNumber" checked> Angka (0-9)</label>
        <label class="check-item"><input type="checkbox" id="optSymbol" checked> Simbol (!@#$)</label>
      </div>

      <button class="gen-btn" id="genBtn">Buat kata sandi baru</button>
      <div class="strength" id="strengthNote"></div>

    </div>
  </section>
</div>

<footer class="site-footer">
  <div class="shell">
    <span>Panel 02 / 04</span>
    <a href="index.html" style="text-decoration:none; color:inherit;">Kembali ke Toolkit</a>
  </div>
</footer>

<script>
const UPPER = "ABCDEFGHJKLMNPQRSTUVWXYZ";
const LOWER = "abcdefghijkmnopqrstuvwxyz";
const NUMBER = "23456789";
const SYMBOL = "!@#$%^&*-_=+";

const lengthRange = document.getElementById('lengthRange');
const lengthVal = document.getElementById('lengthVal');
const pwOutput = document.getElementById('pwOutput');
const strengthNote = document.getElementById('strengthNote');
const copyBtn = document.getElementById('copyBtn');

function getActiveCharset() {
  let charset = "";
  if (document.getElementById('optUpper').checked) charset += UPPER;
  if (document.getElementById('optLower').checked) charset += LOWER;
  if (document.getElementById('optNumber').checked) charset += NUMBER;
  if (document.getElementById('optSymbol').checked) charset += SYMBOL;
  return charset;
}

function generatePassword() {
  const length = parseInt(lengthRange.value);
  const charset = getActiveCharset();

  if (!charset) {
    pwOutput.textContent = "Pilih minimal satu jenis karakter";
    strengthNote.textContent = "";
    return;
  }

  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  let result = "";
  for (let i = 0; i < length; i++) {
    result += charset[array[i] % charset.length];
  }
  pwOutput.textContent = result;
  updateStrength(length, charset.length);
}

function updateStrength(length, poolSize) {
  const entropy = Math.log2(Math.pow(poolSize, length));
  let label = "Lemah";
  if (entropy > 100) label = "Sangat kuat";
  else if (entropy > 70) label = "Kuat";
  else if (entropy > 45) label = "Cukup";
  strengthNote.textContent = `Estimasi entropi: ${Math.round(entropy)} bit — ${label}`;
}

lengthRange.addEventListener('input', () => {
  lengthVal.textContent = lengthRange.value;
  generatePassword();
});

document.querySelectorAll('.checks input').forEach(cb => {
  cb.addEventListener('change', generatePassword);
});

document.getElementById('genBtn').addEventListener('click', generatePassword);

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(pwOutput.textContent).then(() => {
    const original = copyBtn.textContent;
    copyBtn.textContent = "Tersalin!";
    setTimeout(() => { copyBtn.textContent = original; }, 1400);
  });
});

generatePassword();
</script>

</body>
</html>
